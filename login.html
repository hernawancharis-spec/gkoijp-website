<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | GKOI Jemaat Persekutuan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-100 font-sans">

    <div class="min-h-screen flex items-center justify-center px-6">
        <div class="max-w-md w-full bg-white p-10 rounded-3xl shadow-2xl border border-slate-100">
            
            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-blue-900 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-user-shield text-white text-2xl"></i>
                </div>
                <h2 class="text-3xl font-bold text-blue-900">Admin GKOI<span class="text-amber-600">JP</span></h2>
                <p class="text-slate-500 mt-2">Khusus Pengurus Jemaat</p>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Email Resmi</label>
                    <input type="email" id="email" placeholder="admin@gkoijp.or.id" 
                        class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-900 transition-all">
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Kata Sandi</label>
                    <input type="password" id="pass" placeholder="••••••••" 
                        class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-900 transition-all">
                </div>

                <button id="btnLogin" class="w-full bg-blue-900 text-white p-4 rounded-2xl font-bold hover:bg-blue-800 transition-all shadow-lg mt-4">
                    Masuk ke Dashboard
                </button>
            </div>

            <div class="mt-8 text-center">
                <a href="index.html" class="text-sm text-slate-400 hover:text-blue-900 transition">
                    <i class="fas fa-arrow-left mr-2"></i>Kembali ke Website
                </a>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth } from "./js/firebase-config.js";
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";

        const btnLogin = document.getElementById('btnLogin');

        if (btnLogin) {
            btnLogin.addEventListener('click', async () => {
                const emailInput = document.getElementById('email').value;
                const passInput = document.getElementById('pass').value;

                btnLogin.innerHTML = "Memproses...";
                btnLogin.disabled = true;

                try {
                    await signInWithEmailAndPassword(auth, emailInput, passInput);
                    window.location.href = "admin.html";
                } catch (error) {
                    alert("Gagal Login: Periksa kembali Email dan Password.");
                    console.error("Firebase Error:", error.message);
                    btnLogin.innerHTML = "Masuk ke Dashboard";
                    btnLogin.disabled = false;
                }
            });
        }
    </script>
</body>
</html>
