<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin | GKOIJP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 p-6 font-sans">

    <div id="admin-panel" class="max-w-2xl mx-auto hidden">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-bold text-blue-900">Panel Kontrol Warta</h1>
            <button id="btnLogout" class="text-red-500 font-bold hover:text-red-700 transition">
                <i class="fas fa-sign-out-alt mr-1"></i> Keluar
            </button>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-sm space-y-6 border border-slate-100">
            <div>
                <label class="block text-sm font-bold mb-2 text-slate-600">Judul Warta</label>
                <input type="text" id="judul" placeholder="Contoh: Warta Jemaat Minggu Ke-1" class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-900 outline-none text-sm">
            </div>
            
            <div>
                <label class="block text-sm font-bold mb-2 text-slate-600">Isi Pengumuman</label>
                <textarea id="isi" rows="6" placeholder="Tuliskan detail warta di sini..." class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-900 outline-none text-sm"></textarea>
            </div>

            <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                <label class="block text-sm font-bold mb-2 text-blue-900">
                    <i class="fab fa-google-drive mr-1"></i> Link Google Drive PDF (Opsional)
                </label>
                <input type="url" id="pdfLink" placeholder="Tempel link file PDF dari Google Drive di sini..." class="w-full p-4 bg-white border border-blue-200 rounded-xl focus:ring-2 focus:ring-blue-900 outline-none text-sm">
                <p class="text-[10px] text-blue-600 mt-2">*Pastikan akses file di Drive diatur ke "Siapa saja yang memiliki link".</p>
            </div>

            <button id="btnUpload" class="w-full py-4 bg-blue-900 text-white rounded-2xl font-bold hover:bg-blue-800 transition shadow-lg shadow-blue-900/20">
                Publikasikan Warta
            </button>
        </div>

        <div class="mt-12">
            <h3 class="font-bold text-slate-500 uppercase tracking-widest text-xs mb-6 text-center">Warta yang Sedang Tayang</h3>
            <div id="warta-list-admin" class="space-y-4">
                </div>
        </div>
    </div>

    <script type="module">
        import { db, auth } from "./js/firebase-config.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { collection, addDoc, serverTimestamp, query, orderBy, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        const adminPanel = document.getElementById('admin-panel');
        const wartaListAdmin = document.getElementById('warta-list-admin');

        // 1. Proteksi Halaman
        onAuthStateChanged(auth, (user) => {
            if (user) {
                adminPanel.classList.remove('hidden');
            } else {
                window.location.href = "login.html";
            }
        });

        // 2. Fungsi Tambah Warta
        document.getElementById('btnUpload').onclick = async () => {
            const j = document.getElementById('judul').value;
            const i = document.getElementById('isi').value;
            const link = document.getElementById('pdfLink').value;
            const btn = document.getElementById('btnUpload');

            if(!j || !i) return alert("Mohon isi Judul dan Isi Warta!");

            btn.disabled = true;
            btn.innerHTML = "Memproses...";

            try {
                await addDoc(collection(db, "warta"), {
                    judul: j,
                    isi: i,
                    pdfUrl: link, // Menyimpan link Drive
                    tanggal: serverTimestamp()
                });

                alert("Warta Berhasil Dipublikasikan!");
                document.getElementById('judul').value = "";
                document.getElementById('isi').value = "";
                document.getElementById('pdfLink').value = "";
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Publikasikan Warta";
            }
        };

        // 3. Menampilkan & Menghapus Warta (Real-time)
        onSnapshot(query(collection(db, "warta"), orderBy("tanggal", "desc")), (snapshot) => {
            wartaListAdmin.innerHTML = '';
            snapshot.forEach((item) => {
                const data = item.data();
                const id = item.id;
                
                const hasPdf = data.pdfUrl ? `<span class="ml-2 text-[10px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full">Drive Link</span>` : "";
                
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl shadow-sm border flex justify-between items-center";
                card.innerHTML = `
                    <div>
                        <h4 class="font-bold text-blue-900">${data.judul} ${hasPdf}</h4>
                        <p class="text-xs text-slate-400">Terbit di Website</p>
                    </div>
                    <button class="btn-hapus bg-red-50 text-red-600 p-3 rounded-xl hover:bg-red-600 hover:text-white transition">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                `;
                
                card.querySelector('.btn-hapus').onclick = async () => {
                    if(confirm("Hapus warta ini?")) {
                        await deleteDoc(doc(db, "warta", id));
                    }
                };
                
                wartaListAdmin.appendChild(card);
            });
        });

        // 4. Logout
        document.getElementById('btnLogout').onclick = () => signOut(auth);
    </script>
</body>
</html>
