<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin | GKOIJP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 p-6 font-sans">

    <div id="admin-panel" class="max-w-2xl mx-auto hidden">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-bold text-blue-900">Panel Kontrol Warta</h1>
            <button id="btnLogout" class="text-red-500 font-bold hover:text-red-700 transition">
                <i class="fas fa-sign-out-alt mr-1"></i> Keluar
            </button>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-sm space-y-6 border border-slate-100">
            <div>
                <label class="block text-sm font-bold mb-2 text-slate-600">Judul Warta</label>
                <input type="text" id="judul" class="w-full p-4 bg-slate-50 border rounded-2xl focus:ring-2 focus:ring-blue-900 outline-none">
            </div>
            <div>
                <label class="block text-sm font-bold mb-2 text-slate-600">Isi Pengumuman</label>
                <textarea id="isi" rows="6" class="w-full p-4 bg-slate-50 border rounded-2xl focus:ring-2 focus:ring-blue-900 outline-none"></textarea>
            </div>
            <button id="btnUpload" class="w-full bg-blue-900 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-800 transition">
                Publikasikan Warta
            </button>
        </div>

        <div class="mt-12">
            <h2 class="text-xl font-bold text-slate-800 mb-6">Kelola Warta Terbit</h2>
            <div id="admin-warta-list" class="grid gap-4">
                </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from "./js/firebase-config.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { 
            collection, addDoc, serverTimestamp, query, orderBy, onSnapshot, deleteDoc, doc 
        } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        const adminPanel = document.getElementById('admin-panel');
        const wartaListAdmin = document.getElementById('admin-warta-list');

        // 1. Proteksi Halaman
        onAuthStateChanged(auth, (user) => {
            if (user) {
                adminPanel.classList.remove('hidden');
            } else {
                window.location.href = "login.html";
            }
        });

        // 2. Fungsi Upload
        document.getElementById('btnUpload').addEventListener('click', async () => {
            const j = document.getElementById('judul').value;
            const i = document.getElementById('isi').value;
            if(!j || !i) return alert("Isi semua data!");

            try {
                await addDoc(collection(db, "warta"), {
                    judul: j,
                    isi: i,
                    tanggal: serverTimestamp()
                });
                alert("Warta Terbit!");
                document.getElementById('judul').value = "";
                document.getElementById('isi').value = "";
            } catch (err) {
                alert("Gagal: " + err.message);
            }
        });

        // 3. List & Delete (Real-time)
        onSnapshot(query(collection(db, "warta"), orderBy("tanggal", "desc")), (snapshot) => {
            wartaListAdmin.innerHTML = '';
            snapshot.forEach((item) => {
                const data = item.data();
                const id = item.id;
                
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl shadow-sm border flex justify-between items-center";
                card.innerHTML = `
                    <div>
                        <h4 class="font-bold">${data.judul}</h4>
                        <p class="text-xs text-slate-400">Terbit di Website</p>
                    </div>
                    <button class="btn-hapus bg-red-50 text-red-600 p-3 rounded-xl hover:bg-red-600 hover:text-white transition" data-id="${id}">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                `;
                
                // Pasang fungsi hapus ke tombol
                card.querySelector('.btn-hapus').onclick = async () => {
                    if(confirm("Hapus warta ini?")) {
                        await deleteDoc(doc(db, "warta", id));
                    }
                };
                
                wartaListAdmin.appendChild(card);
            });
        });

        // 4. Logout
        document.getElementById('btnLogout').onclick = () => signOut(auth);
    </script>
</body>
</html>
